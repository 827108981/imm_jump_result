        document.getElementById("deleteCurrentBtn").addEventListener("click", function () { closeMoreMenu(); deleteDraft(state.draftId); });
        document.getElementById("dismissNoticeBtn").addEventListener("click", function () { localStorage.setItem(NOTICE_STORAGE_KEY, "1"); document.getElementById("noticeCard").classList.add("hidden"); });
        document.getElementById("baseEditBtn").addEventListener("click", toggleBaseEditor);
        document.getElementById("nextTodoTopBtn").addEventListener("click", goToNextTodo);
        document.getElementById("bottomNextBtn").addEventListener("click", function () { if (state.lastValidationPassed && !validateReport(state.report).length) exportZip("final"); else goToNextTodo(); });
        document.getElementById("showErrorSummaryBtn").addEventListener("click", function () { state.errorMode = true; updateStatsAndErrors(true); });
        document.getElementById("prevErrorBtn").addEventListener("click", function () { navigateError(-1); });
        document.getElementById("nextErrorBtn").addEventListener("click", function () { navigateError(1); });
        document.getElementById("viewerCloseBtn").addEventListener("click", closeImageViewer);
        document.getElementById("viewerPrevBtn").addEventListener("click", function () { moveViewer(-1); });
        document.getElementById("viewerNextBtn").addEventListener("click", function () { moveViewer(1); });
        document.getElementById("baseForm").addEventListener("input", function (event) {
          if (!state.report || !event.target.name) return;
          state.report.base_info[event.target.name] = event.target.value;
          scheduleSave();
          updateStatsAndErrors(false);
          renderDraftLabel();
          renderBaseSummary();
          if (event.target.tagName === "TEXTAREA") autoResize(event.target);
        });
        document.getElementById("baseForm").addEventListener("change", function (event) {
          if (!event.target.name) return;
          if (event.target.name === "engineer" || event.target.name === "contact") savePreferences(event.target.name, event.target.value);
        });
        document.querySelectorAll("[data-filter]").forEach(function (button) {
          button.addEventListener("click", function () {
            document.querySelectorAll("[data-filter]").forEach(function (item) {
              const active = item === button;
              item.classList.toggle("active", active);
              item.setAttribute("aria-selected", active ? "true" : "false");
            });
            state.filter = button.dataset.filter;
            persistUi();
            renderItems();
          });
        });
        document.addEventListener("keydown", function (event) {
          if (event.key === "Escape") { closeImageViewer(); closeReportDrawer(); closeMoreMenu(); }
        });
      }

      function renderBrowserNotice(forceShow) {
        const ua = navigator.userAgent || "";
        const card = document.getElementById("noticeCard");
        const copy = document.querySelector("#browserNotice .notice-copy");
        const inWechat = /MicroMessenger/i.test(ua);
        card.classList.toggle("hidden", !inWechat && !forceShow && localStorage.getItem(NOTICE_STORAGE_KEY) === "1");
        copy.textContent = inWechat
          ? "当前看起来是在微信内置浏览器中打开。为避免长时间填写、照片缓存或 ZIP 导出失败，请点右上角菜单，选择在浏览器中打开。"
          : "本文件可离线填写，数据会自动保存在当前手机浏览器中。建议使用 Safari、Chrome、Edge 或手机系统浏览器打开。";
      }

      function openDb() {
        if (!window.indexedDB) {
          alert("当前浏览器不支持 IndexedDB，无法安全缓存照片。请换 Safari、Chrome 或 Edge。");
          return Promise.reject(new Error("IndexedDB unavailable"));
        }
        return new Promise(function (resolve, reject) {
          const request = indexedDB.open(DB_NAME, DB_VERSION);
          request.onupgradeneeded = function () {
            const db = request.result;
            if (!db.objectStoreNames.contains(REPORT_STORE)) db.createObjectStore(REPORT_STORE, { keyPath: "draft_id" });
            if (!db.objectStoreNames.contains(PHOTO_STORE)) db.createObjectStore(PHOTO_STORE, { keyPath: "photo_id" });
          };
          request.onsuccess = function () { resolve(request.result); };
          request.onerror = function () { reject(request.error || new Error("本地缓存打开失败")); };
        });
      }

      function dbGetAll(store) {
        return new Promise(function (resolve, reject) {
          const tx = state.db.transaction(store, "readonly");
          const request = tx.objectStore(store).getAll();
          request.onsuccess = function () { resolve(request.result || []); };
          request.onerror = function () { reject(request.error); };
        });
      }

      function dbGet(store, key) {
        return new Promise(function (resolve, reject) {
          const tx = state.db.transaction(store, "readonly");
          const request = tx.objectStore(store).get(key);
          request.onsuccess = function () { resolve(request.result || null); };
          request.onerror = function () { reject(request.error); };
        });
      }

      function dbPut(store, row) {
        return new Promise(function (resolve, reject) {
          const tx = state.db.transaction(store, "readwrite");
          const request = tx.objectStore(store).put(row);
          request.onsuccess = function () { resolve(row); };
          request.onerror = function () { reject(request.error); };
        });
      }

      function dbDelete(store, key) {
        return new Promise(function (resolve, reject) {
          const tx = state.db.transaction(store, "readwrite");
          const request = tx.objectStore(store).delete(key);
          request.onsuccess = function () { resolve(); };
          request.onerror = function () { reject(request.error); };
        });
      }

      async function loadDrafts() {
        state.drafts = (await dbGetAll(REPORT_STORE)).sort(function (a, b) {
          return String(b.updated_at || "").localeCompare(String(a.updated_at || ""));
        });
        renderDrafts();
      }

      function blankReport() {
        const now = isoNow();
        const preferences = readPreferences();
        const data = {};
        config.templateItems.forEach(function (item) {
          data[item.id] = {
            id: item.id,
            measured_value: "",
            conclusion: "正常",
            before_images: [],
            after_images: []
          };
        });
        const checkDate = new Date();
        const yyyy = checkDate.getFullYear();
        const mm = String(checkDate.getMonth() + 1).padStart(2, "0");
        const dd = String(checkDate.getDate()).padStart(2, "0");
        return {
          draft_id: "offline_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2, 8),
          created_at: now,
          updated_at: now,
          base_info: { check_date: yyyy + "-" + mm + "-" + dd, engineer: preferences.engineer || "", contact: preferences.contact || "" },
          item_data: data,
          last_exported_at: "",
          last_issue_no: ""
        };
      }

      async function createDraft() {
        state.report = blankReport();
        state.draftId = state.report.draft_id;
        await saveNow();
        await loadDrafts();
        await hydratePreviews();
        restoreUi();
        renderAll();
        closeReportDrawer();
        showToast("已新建离线报告。");
      }

      async function openDraft(draftId) {
        const report = await dbGet(REPORT_STORE, draftId);
        if (!report) return;
        state.report = report;
        state.draftId = draftId;
        ensureReportShape();
        await hydratePreviews();
        restoreUi();
        renderAll();
        setSaveStatus("已载入本机报告");
        closeReportDrawer();
      }

      async function deleteDraft(draftId) {
        if (!confirm("确定删除这份本机报告及照片缓存吗？")) return;
        const report = await dbGet(REPORT_STORE, draftId);
        if (report) {
          Object.keys(report.item_data || {}).forEach(function (itemId) {
            ["before_images", "after_images"].forEach(function (field) {
              (report.item_data[itemId][field] || []).forEach(function (image) {
                dbDelete(PHOTO_STORE, image.photo_id);
              });
            });
          });
        }
        await dbDelete(REPORT_STORE, draftId);
        Object.keys(state.previewUrls).forEach(function (key) { URL.revokeObjectURL(state.previewUrls[key]); });
        state.previewUrls = {};
        await loadDrafts();
        if (state.drafts.length) await openDraft(state.drafts[0].draft_id);
        else await createDraft();
      }

      function ensureReportShape() {
        if (!state.report.base_info) state.report.base_info = {};
        if (!state.report.item_data) state.report.item_data = {};
        config.templateItems.forEach(function (item) {
          if (!state.report.item_data[item.id]) {
            state.report.item_data[item.id] = { id: item.id, measured_value: "", conclusion: "正常", before_images: [], after_images: [] };
          }
        });
      }

      function scheduleSave() {
        window.clearTimeout(state.saveTimer);
        setSaveStatus("保存中");
        state.saveTimer = window.setTimeout(function () { saveNow(); }, 350);
      }

      async function saveNow(showMessage) {
        if (!state.report) return;
        try {
          state.report.updated_at = isoNow();
          await dbPut(REPORT_STORE, state.report);
          setSaveStatus("已保存 " + timeText());
          if (showMessage) showToast("已安全保存到本机。");
          await loadDrafts();
        } catch (err) {
          setSaveStatus("保存失败", "error");
          if (showMessage) showToast("本机保存失败，请勿关闭页面后重试。");
          throw err;
        }
      }

      function renderAll() {
        renderBaseForm();
        renderDraftLabel();
        updateStatsAndErrors(false);
        ensureExpandedItem();
        renderItems();
      }

      function renderBaseForm() {
        config.basicFields.forEach(function (field) {
          const node = document.querySelector("[name='" + field.key + "']");
          if (node) node.value = state.report.base_info[field.key] || "";
        });
        document.querySelectorAll("#baseForm textarea").forEach(autoResize);
        renderBaseSummary();
      }

      function renderDraftLabel() {
        const base = state.report.base_info || {};
        const label = [base.hospital || "未填医院", base.model || "未填机型", base.serial || "未填序列号"].join(" / ");
        document.getElementById("currentDraftLabel").textContent = label;
        const subtitle = document.getElementById("headerReportSubtitle");
        if (subtitle) subtitle.textContent = "当前报告：" + [base.hospital || "未填写医院", base.model || "未填写型号"].join(" / ");
        const meta = document.getElementById("currentReportMeta");
        if (meta) meta.textContent = "完成 " + computeStats(state.report).completed_items + "/" + config.templateItems.length + " · 本机自动缓存";
      }

      function renderBaseSummary() {
        const base = state.report.base_info || {};
        const complete = config.basicFields.filter(function (field) { return field.required; }).every(function (field) { return String(base[field.key] || "").trim(); });
        const summary = document.getElementById("baseSummary");
        const editor = document.getElementById("baseEditor");
        const button = document.getElementById("baseEditBtn");
        const collapsed = !!state.ui.baseCollapsed && complete;
        summary.classList.toggle("hidden", !collapsed);
        editor.classList.toggle("hidden", collapsed);
        button.textContent = collapsed ? "编辑" : (complete ? "收起" : "请补全");
        if (collapsed) {
          summary.innerHTML = '<div><strong>' + escapeHtml(base.hospital || "未填写医院") + ' / ' + escapeHtml(base.model || "未填写型号") + '</strong><p>序列号：' + escapeHtml(base.serial || "未填写") + ' · 工程师：' + escapeHtml(base.engineer || "未填写") + '</p></div><button type="button" data-edit-base>编辑</button>';
          summary.querySelector("[data-edit-base]").addEventListener("click", toggleBaseEditor);
        }
      }

      function renderDrafts() {
        const root = document.getElementById("draftList");
        const count = document.getElementById("reportCount");
        if (count) count.textContent = state.drafts.length + " 份";
        if (!state.drafts.length) {
          root.innerHTML = '<div class="empty">暂无本机报告</div>';
          return;
        }
        root.innerHTML = state.drafts.map(function (draft) {
          const base = draft.base_info || {};
          const stats = computeStats(draft);
          const title = [base.hospital || "未填医院", base.model || "未填机型", base.serial || "未填序列号"].join(" / ");
          const exported = draft.last_exported_at ? "已导出：" + formatDateTime(draft.last_exported_at) : "未导出";
          return [
            '<div class="draft-row">',
            '<div><strong>' + escapeHtml(title) + '</strong>',
            '<span>序列号：' + escapeHtml(base.serial || "未填写") + '｜完成：' + stats.completed_items + '/' + stats.total_items + '｜照片：' + stats.uploaded_image_count + '<br>最后保存：' + escapeHtml(formatDateTime(draft.updated_at)) + '｜' + exported + '</span></div>',
            '<div class="actions">',
            '<button type="button" data-open-draft="' + escapeHtml(draft.draft_id) + '">继续</button>',
            '<button type="button" class="danger" data-delete-draft="' + escapeHtml(draft.draft_id) + '">删除</button>',
            '</div></div>'
          ].join("");
        }).join("");
        root.querySelectorAll("[data-open-draft]").forEach(function (btn) {
          btn.addEventListener("click", function () { openDraft(btn.dataset.openDraft); });
        });
        root.querySelectorAll("[data-delete-draft]").forEach(function (btn) {
          btn.addEventListener("click", function () { deleteDraft(btn.dataset.deleteDraft); });
        });
      }

      function itemData(itemId) {
        return state.report.item_data[itemId];
      }

      function fieldKind(required, optionalText) {
        return '<span class="field-kind ' + (required ? "required" : "optional") + '">' + (required ? "必填" : (optionalText || "选填")) + '</span>';
      }

      function requirementTags(item) {
        const required = [];
        const optional = ["排查结论"];
        if (item.record_required) required.push("实测记录"); else optional.push("实测记录");
        if (item.before_required) required.push("原始照片"); else optional.push("原始照片");
        if (item.after_required) required.push("维护后照片"); else optional.push("维护后照片");
        return (required.length ? '<span class="requirement-tag required">必填：' + required.join("、") + '</span>' : '') +
          '<span class="requirement-tag optional">选填：' + optional.join("、") + '</span>';
      }

      function renderItems() {
        const root = document.getElementById("itemList");
        const errors = new Set((state.lastErrors || []).map(function (err) {
          return (err.item_id || "") + "::" + (err.field || "");
        }));
        const visibleItems = config.templateItems.filter(function (item) {
          const data = itemData(item.id);
          if (state.filter === "all") return true;
          if (state.filter === "todo") return !isItemDone(item, data);
          if (state.filter === "photo") return (item.before_required && !data.before_images.length) || (item.after_required && !data.after_images.length);
          if (state.filter === "record") return item.record_required && !String(data.measured_value || "").trim();
          if (state.filter === "attention") return ["异常", "已处理", "待确认"].includes(data.conclusion);
          return true;
        });
        root.innerHTML = visibleItems.map(function (item) {
          const data = itemData(item.id);
          const itemHasError = state.lastErrors.some(function (err) { return err.item_id === item.id; });
          const done = isItemDone(item, data);
          const open = state.ui.expandedItemId === item.id;
          const referenceOpen = !!(state.ui.referenceOpen || {})[item.id];
          const photoCount = (data.before_images || []).length + (data.after_images || []).length;
          const action = String(item.action || "").replace(/\s+/g, " ").trim();
          const shortAction = action.length > 58 ? action.slice(0, 58) + "…" : action;
          const attention = ["异常", "已处理", "待确认"].includes(data.conclusion);
          return [
            '<article class="item-card ' + (open ? "open " : "") + (itemHasError ? "has-error " : "") + (done ? "is-done " : "") + (attention ? "attention" : "") + '" data-item-id="' + escapeHtml(item.id) + '">',
            '<div class="item-head"><button class="item-toggle" type="button" data-toggle-item="' + escapeHtml(item.id) + '" aria-expanded="' + (open ? "true" : "false") + '" aria-controls="item_body_' + escapeHtml(item.id) + '">',
            '<div><h3>' + escapeHtml(item.display_step || item.step) + '｜' + escapeHtml(shortAction) + '</h3><p>分类：' + escapeHtml(item.category || "未分类") + ' · 照片 ' + photoCount + '</p><div class="requirement-tags">' + requirementTags(item) + '</div></div>',
            '<span class="tag ' + (done ? "done" : "required") + '">' + (done ? "已完成" : (itemHasError ? "待补" : "待填写")) + '</span></button></div>',
            open ? renderItemBody(item, data, errors, referenceOpen) : '',
            '</article>'
          ].join("");
        }).join("") || '<div class="empty">当前筛选下没有排查项。<button type="button" data-show-all>查看全部</button></div>';
        bindItemEvents(root);
      }

      function renderItemBody(item, data, errors, referenceOpen) {
        const recordPlaceholder = item.record_template && item.record_template !== "N/A" ? item.record_template : "请填写现场实测情况、处理动作或结果";
        return [
          '<div class="item-body" id="item_body_' + escapeHtml(item.id) + '">',
          '<section class="item-reference"><button type="button" class="reference-toggle" data-reference-toggle="' + escapeHtml(item.id) + '" aria-expanded="' + (referenceOpen ? "true" : "false") + '" aria-controls="reference_' + escapeHtml(item.id) + '"><span>查看排查要求与合格标准</span><span aria-hidden="true">' + (referenceOpen ? "收起" : "展开") + '</span></button>',
          '<div id="reference_' + escapeHtml(item.id) + '" class="reference-content ' + (referenceOpen ? "open" : "") + '"><div class="detail"><span>排查动作</span><p>' + escapeHtml(item.action || "") + '</p></div><div class="detail"><span>合格指标</span><p>' + escapeHtml(item.standard || "") + '</p></div></div></section>',
          '<div class="record-grid">',
          '<label class="field"><span class="field-heading">实测情况记录' + fieldKind(item.record_required) + '</span><textarea rows="4" placeholder="' + escapeHtml(recordPlaceholder) + '" data-record="' + escapeHtml(item.id) + '" class="' + (errors.has(item.id + "::measured_value") ? "has-error" : "") + '">' + escapeHtml(data.measured_value || "") + '</textarea><small class="input-hint" data-record-hint="' + escapeHtml(item.id) + '"></small></label>',
          '<div class="field"><span class="field-heading">排查结论' + fieldKind(false, "选填，默认正常") + '</span><div class="conclusion-grid">' + CONCLUSIONS.map(function (value) { return '<button type="button" data-conclusion="' + escapeHtml(item.id) + '" data-value="' + value + '" class="' + (value === data.conclusion ? "selected" : "") + '" aria-pressed="' + (value === data.conclusion ? "true" : "false") + '">' + value + '</button>'; }).join("") + '</div></div>',
          '</div><div class="photo-row">',
          renderPhotoBox(item, "before_images", errors), renderPhotoBox(item, "after_images", errors),
          '</div></div>'
        ].join("");
      }

      function renderPhotoBox(item, field, errors) {
        const data = itemData(item.id);
        const images = data[field] || [];
        const required = field === "before_images" ? item.before_required : item.after_required;
        const note = required ? "正式导出前至少上传 1 张" : "无现场照片时可不上传";
        const safe = item.id + "_" + field;
        const message = state.photoMessages[item.id + "::" + field] || "";
        const atLimit = images.length >= config.maxImagesPerField;
        return [
          '<div class="photo-box">',
          '<div class="photo-head"><div><div class="field-heading"><span>' + FIELD_LABELS[field] + '</span>' + fieldKind(required) + '</div><p class="field-note">' + note + '</p></div><span>' + images.length + '/' + config.maxImagesPerField + '</span></div>',
          '<div class="photo-actions">',
          '<label><button type="button" data-trigger="' + safe + '_camera"' + (atLimit ? " disabled" : "") + '>拍照</button><input id="' + safe + '_camera" type="file" accept="image/*" capture="environment" data-photo-field="' + field + '" data-photo-item="' + item.id + '"></label>',
          '<label><button type="button" data-trigger="' + safe + '_album"' + (atLimit ? " disabled" : "") + '>选图</button><input id="' + safe + '_album" type="file" accept="image/*" multiple data-photo-field="' + field + '" data-photo-item="' + item.id + '"></label>',
          '</div>',
          images.length ? '<div class="photo-grid">' + images.map(function (image) {
            return '<div class="thumb"><button type="button" class="thumb-open" data-open-photo="' + escapeHtml(image.photo_id) + '" aria-label="预览照片"><img src="' + escapeHtml(state.previewUrls[image.photo_id] || "") + '" alt="' + escapeHtml(image.original_name || "图片") + '"></button><button type="button" data-delete-photo="' + escapeHtml(image.photo_id) + '" data-delete-item="' + escapeHtml(item.id) + '" data-delete-field="' + field + '">删</button></div>';
          }).join("") + '</div>' : '<div class="photo-empty ' + (errors.has(item.id + "::" + field) ? "error-line" : "") + '">暂无照片</div>',
          message ? '<div class="' + (message.indexOf("失败") > -1 ? "photo-error" : "photo-status") + '">' + escapeHtml(message) + '</div>' : '',
          '</div>'
        ].join("");
      }

      function bindItemEvents(root) {
        root.querySelectorAll("[data-show-all]").forEach(function (node) { node.addEventListener("click", function () { state.filter = "all"; document.querySelector("[data-filter='all']").click(); }); });
        root.querySelectorAll("[data-toggle-item]").forEach(function (node) {
          node.addEventListener("click", function () { setExpandedItem(node.dataset.toggleItem); });
        });
        root.querySelectorAll("[data-reference-toggle]").forEach(function (node) {
          node.addEventListener("click", function () { state.ui.referenceOpen[node.dataset.referenceToggle] = !state.ui.referenceOpen[node.dataset.referenceToggle]; persistUi(); renderItems(); });
        });
        root.querySelectorAll("[data-record]").forEach(function (node) {
          node.addEventListener("input", function () {
            itemData(node.dataset.record).measured_value = node.value;
            autoResize(node);
            scheduleSave();
            updateStatsAndErrors(false);
          });
          node.addEventListener("blur", function () {
            const hint = root.querySelector("[data-record-hint='" + node.dataset.record + "']");
            if (hint) hint.textContent = node.value.trim() && node.value.trim().length < 2 ? "内容过短，请补充有效描述" : "";
          });
        });
        root.querySelectorAll("[data-conclusion]").forEach(function (node) {
          node.addEventListener("click", function () {
            itemData(node.dataset.conclusion).conclusion = node.dataset.value || "正常";
            scheduleSave();
            renderItems();
            updateStatsAndErrors(false);
          });
        });
        root.querySelectorAll("[data-trigger]").forEach(function (button) {
          button.addEventListener("click", function () {
            const input = document.getElementById(button.dataset.trigger);
            if (input) input.click();
          });
        });
        root.querySelectorAll("[data-photo-field]").forEach(function (input) {
          input.addEventListener("change", function () {
            addPhotos(input.dataset.photoItem, input.dataset.photoField, input.files).finally(function () {
              input.value = "";
            });
          });
        });
        root.querySelectorAll("[data-delete-photo]").forEach(function (button) {
          button.addEventListener("click", function () {
            deletePhoto(button.dataset.deleteItem, button.dataset.deleteField, button.dataset.deletePhoto);
          });
        });
        root.querySelectorAll("[data-open-photo]").forEach(function (button) {
          button.addEventListener("click", function () { openImageViewer(button.dataset.openPhoto); });
        });
      }

      function readPreferences() {
        try { return JSON.parse(localStorage.getItem(PREFS_STORAGE_KEY) || "{}"); } catch (err) { return {}; }
      }

      function savePreferences(key, value) {
        if (!String(value || "").trim()) return;
        const preferences = readPreferences();
        preferences[key] = String(value).trim();
        try { localStorage.setItem(PREFS_STORAGE_KEY, JSON.stringify(preferences)); } catch (err) { /* 缓存不可用时仍保留本次填写 */ }
      }

      function restoreUi() {
        const fallback = { expandedItemId: "", referenceOpen: {}, baseCollapsed: false, filter: "all" };
        try {
          const saved = JSON.parse(localStorage.getItem(UI_STORAGE_PREFIX + state.draftId) || "{}");
          state.ui = Object.assign(fallback, saved || {});
        } catch (err) {
          state.ui = fallback;
        }
        state.ui.referenceOpen = state.ui.referenceOpen || {};
        state.filter = state.ui.filter || "all";
        document.querySelectorAll("[data-filter]").forEach(function (button) {
          const active = button.dataset.filter === state.filter;
          button.classList.toggle("active", active);
          button.setAttribute("aria-selected", active ? "true" : "false");
        });
      }

      function persistUi() {
        if (!state.draftId) return;
        state.ui.filter = state.filter;
        try { localStorage.setItem(UI_STORAGE_PREFIX + state.draftId, JSON.stringify(state.ui)); } catch (err) { /* UI 偏好不影响报告数据 */ }
      }

      function ensureExpandedItem() {
        const current = state.ui.expandedItemId;
        if (current && itemData(current)) return;
        const firstTodo = config.templateItems.find(function (item) { return !isItemDone(item, itemData(item.id)); });
        if (firstTodo) {
          state.ui.expandedItemId = firstTodo.id;
          if (state.ui.referenceOpen[firstTodo.id] === undefined) state.ui.referenceOpen[firstTodo.id] = true;
          persistUi();
        }
      }

      function setExpandedItem(itemId, keepScroll) {
        if (!itemId) return;
        state.ui.expandedItemId = itemId;
        if (state.ui.referenceOpen[itemId] === undefined) {
          const item = config.templateItems.find(function (entry) { return entry.id === itemId; });
          state.ui.referenceOpen[itemId] = item ? !isItemDone(item, itemData(itemId)) : false;
        }
        persistUi();
        renderItems();
        if (!keepScroll) {
          window.setTimeout(function () {
            const node = document.querySelector("[data-item-id='" + cssEscape(itemId) + "']");
            if (node) node.scrollIntoView({ behavior: "smooth", block: "start" });
          }, 20);
        }
      }

      function toggleBaseEditor() {
        const base = state.report.base_info || {};
        const complete = config.basicFields.filter(function (field) { return field.required; }).every(function (field) { return String(base[field.key] || "").trim(); });
        if (!complete) {
          state.ui.baseCollapsed = false;
          showToast("请先补全基础信息。");
        } else {
          state.ui.baseCollapsed = !state.ui.baseCollapsed;
        }
        persistUi();
        renderBaseSummary();
      }

      function openReportDrawer() {
        closeMoreMenu();
        renderDrafts();
        document.getElementById("drawerBackdrop").classList.remove("hidden");
        document.getElementById("reportDrawer").classList.remove("hidden");
      }

      function closeReportDrawer() {
        document.getElementById("drawerBackdrop").classList.add("hidden");
        document.getElementById("reportDrawer").classList.add("hidden");
      }

      function toggleMoreMenu() {
        const panel = document.getElementById("moreMenuPanel");
        const button = document.getElementById("moreMenuBtn");
        const hidden = panel.classList.toggle("hidden");
        button.setAttribute("aria-expanded", hidden ? "false" : "true");
      }

      function closeMoreMenu() {
        const panel = document.getElementById("moreMenuPanel");
        const button = document.getElementById("moreMenuBtn");
        if (panel) panel.classList.add("hidden");
        if (button) button.setAttribute("aria-expanded", "false");
      }

      function goToNextTodo() {
        const startIndex = Math.max(0, config.templateItems.findIndex(function (item) { return item.id === state.ui.expandedItemId; }));
        const candidates = config.templateItems.filter(function (item) { return !isItemDone(item, itemData(item.id)); });
        if (!candidates.length) { showToast("所有必填内容均已补齐，请检查完整性后导出。"); return; }
        let next = candidates.find(function (item) { return config.templateItems.indexOf(item) > startIndex; });
        if (!next) next = candidates[0];
        if (state.filter !== "all" && state.filter !== "todo") {
          state.filter = "todo";
          document.querySelectorAll("[data-filter]").forEach(function (button) { button.classList.toggle("active", button.dataset.filter === "todo"); });
        }
        setExpandedItem(next.id);
      }

      function renderErrorGroups(errors) {
        const groups = [
          { key: "basic", title: "基础信息", test: function (err) { return !err.item_id; } },
          { key: "record", title: "记录待补", test: function (err) { return err.field === "measured_value"; } },
          { key: "before", title: "原始照片待补", test: function (err) { return err.field === "before_images"; } },
          { key: "after", title: "维护后照片待补", test: function (err) { return err.field === "after_images"; } }
        ];
        return groups.map(function (group) {
          const items = errors.map(function (err, index) { return Object.assign({ index: index }, err); }).filter(group.test);
          if (!items.length) return "";
          return '<details class="error-group" open><summary>' + group.title + '（' + items.length + '）</summary><div class="errors">' + items.map(function (err) { return '<button type="button" class="error-line" data-focus-error="' + err.index + '">' + escapeHtml(err.message) + '</button>'; }).join("") + '</div></details>';
        }).join("");
      }

      function navigateError(delta) {
        const errors = validateReport(state.report);
        if (!errors.length) { showToast("当前没有待补内容。"); return; }
        state.errorIndex = (state.errorIndex + delta + errors.length) % errors.length;
        focusErrorTarget(errors[state.errorIndex]);
      }

      function openImageViewer(photoId) {
        state.viewerPhotos = [];
        config.templateItems.forEach(function (item) {
          ["before_images", "after_images"].forEach(function (field) {
            (itemData(item.id)[field] || []).forEach(function (image) { state.viewerPhotos.push(image); });
          });
        });
        state.viewerIndex = Math.max(0, state.viewerPhotos.findIndex(function (image) { return image.photo_id === photoId; }));
        renderImageViewer();
        document.getElementById("imageViewer").classList.remove("hidden");
      }

      function renderImageViewer() {
        const image = state.viewerPhotos[state.viewerIndex];
        if (!image) return closeImageViewer();
        document.getElementById("viewerImage").src = state.previewUrls[image.photo_id] || "";
        document.getElementById("viewerImage").alt = image.original_name || "现场照片";
        document.getElementById("viewerCounter").textContent = (state.viewerIndex + 1) + " / " + state.viewerPhotos.length;
      }

      function moveViewer(delta) {
        if (!state.viewerPhotos.length) return;
        state.viewerIndex = (state.viewerIndex + delta + state.viewerPhotos.length) % state.viewerPhotos.length;
        renderImageViewer();
      }

      function closeImageViewer() {
        const viewer = document.getElementById("imageViewer");
        if (viewer) viewer.classList.add("hidden");
      }

      function autoResize(node) {
        if (!node || node.tagName !== "TEXTAREA") return;
        node.style.height = "auto";
        node.style.height = Math.max(112, node.scrollHeight) + "px";
      }

      function cssEscape(value) {
        return String(value).replace(/[^a-zA-Z0-9_-]/g, "\\$&");
      }

      async function hydratePreviews() {
        Object.keys(state.previewUrls).forEach(function (key) { URL.revokeObjectURL(state.previewUrls[key]); });
        state.previewUrls = {};
        if (!state.report) return;
        const photoIds = [];
        Object.keys(state.report.item_data || {}).forEach(function (itemId) {
          ["before_images", "after_images"].forEach(function (field) {
            (state.report.item_data[itemId][field] || []).forEach(function (image) {
              if (image.photo_id) photoIds.push(image.photo_id);
            });
          });
        });
        for (const id of photoIds) {
          const row = await dbGet(PHOTO_STORE, id);
          if (row && row.blob) state.previewUrls[id] = URL.createObjectURL(row.blob);
        }
      }

      async function addPhotos(itemId, field, fileList) {
        const files = Array.from(fileList || []);
        if (!files.length) return;
        const data = itemData(itemId);
        const messageKey = itemId + "::" + field;
        if ((data[field] || []).length + files.length > config.maxImagesPerField) {
          showToast("每个位置最多上传 " + config.maxImagesPerField + " 张照片。");
          return;
        }
        state.photoMessages[messageKey] = "正在处理照片…";
        renderItems();
        setSaveStatus("处理照片");
        let failures = 0;
        for (const file of files) {
          try {
            const processed = await preprocessImage(file);
            const photoId = "photo_" + Date.now().toString(36) + "_" + Math.random().toString(36).slice(2, 10);
            await dbPut(PHOTO_STORE, { photo_id: photoId, blob: processed.blob, created_at: isoNow() });
            state.previewUrls[photoId] = URL.createObjectURL(processed.blob);
            data[field].push({
              photo_id: photoId,
              original_name: file.name || processed.file_name,
              file_name: processed.file_name,
              size: processed.blob.size,
              original_size: file.size || processed.blob.size,
              compressed: processed.compressed,
              type: "image/jpeg"
            });
          } catch (err) {
            failures += 1;
            showToast(err.message || "照片处理失败，请重新选择。");
          }
        }
        await saveNow();
        state.photoMessages[messageKey] = failures ? "部分照片处理失败，请重新选择" : "照片已保存到本机";
        renderItems();
        updateStatsAndErrors(false);
      }

      async function deletePhoto(itemId, field, photoId) {
        if (!confirm("确定删除这张本机缓存照片吗？")) return;
        const data = itemData(itemId);
        data[field] = (data[field] || []).filter(function (image) { return image.photo_id !== photoId; });
        if (state.previewUrls[photoId]) URL.revokeObjectURL(state.previewUrls[photoId]);
        delete state.previewUrls[photoId];
        await dbDelete(PHOTO_STORE, photoId);
        await saveNow();
        state.photoMessages[itemId + "::" + field] = "照片已删除";
        renderItems();
        updateStatsAndErrors(false);
      }

      function loadImageFromFile(file) {
        return new Promise(function (resolve, reject) {
          const url = URL.createObjectURL(file);
          const image = new Image();
          image.onload = function () { URL.revokeObjectURL(url); resolve(image); };
          image.onerror = function () { URL.revokeObjectURL(url); reject(new Error("图片读取失败，请重新选择。")); };
          image.src = url;
        });
      }

      function canvasToBlob(canvas, quality) {
        return new Promise(function (resolve) {
          canvas.toBlob(function (blob) { resolve(blob); }, "image/jpeg", quality);
        });
      }

      async function preprocessImage(file) {
        if (!file || !/^image\//i.test(file.type || "")) throw new Error("请选择图片文件。");
        const image = await loadImageFromFile(file);
        const ratio = Math.min(1, MAX_CLIENT_SIDE / Math.max(image.naturalWidth || image.width, image.naturalHeight || image.height));
        const width = Math.max(1, Math.round((image.naturalWidth || image.width) * ratio));
        const height = Math.max(1, Math.round((image.naturalHeight || image.height) * ratio));
        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(image, 0, 0, width, height);
        let quality = 0.86;
        let blob = await canvasToBlob(canvas, quality);
        while (blob && blob.size > TARGET_IMAGE_SIZE && quality > 0.58) {
          quality -= 0.08;
          blob = await canvasToBlob(canvas, quality);
        }
        while (blob && blob.size > config.maxImageSize && quality > 0.42) {
          quality -= 0.06;
          blob = await canvasToBlob(canvas, quality);
        }
        if (!blob) throw new Error("图片压缩失败，请重新选择。");
        if (blob.size > config.maxImageSize) throw new Error("图片压缩后仍超过 5MB，请先在相册中压缩或减少图片尺寸。");
        return {
          blob: blob,
          file_name: cleanFileBase(file.name) + "_compressed.jpg",
          compressed: blob.size < (file.size || blob.size)
        };
      }

      function computeStats(report) {
        report = report || state.report;
        const errors = validateReport(report);
        let completed = 0;
        let photoCount = 0;
        const conclusion = { "正常": 0, "异常": 0, "已处理": 0, "待确认": 0 };
        config.templateItems.forEach(function (item) {
          const data = report.item_data[item.id] || {};
          photoCount += (data.before_images || []).length + (data.after_images || []).length;
          conclusion[data.conclusion || "正常"] = (conclusion[data.conclusion || "正常"] || 0) + 1;
          if (isItemDone(item, data)) completed += 1;
        });
        return {
          total_items: config.templateItems.length,
          completed_items: completed,
          uncompleted_items: Math.max(config.templateItems.length - completed, 0),
          missing_image_count: errors.filter(function (err) { return err.field === "before_images" || err.field === "after_images"; }).length,
          uploaded_image_count: photoCount,
          compressed_image_count: photoCount,
          normal_count: conclusion["正常"] || 0,
          abnormal_count: conclusion["异常"] || 0,
          handled_count: conclusion["已处理"] || 0,
          pending_count: conclusion["待确认"] || 0,
          attention_count: (conclusion["异常"] || 0) + (conclusion["已处理"] || 0) + (conclusion["待确认"] || 0),
          passed: !errors.length
        };
      }

      function isItemDone(item, data) {
        if (item.record_required && String(data.measured_value || "").trim().length < 2) return false;
        if (item.before_required && !(data.before_images || []).length) return false;
        if (item.after_required && !(data.after_images || []).length) return false;
        return true;
      }

      function validateReport(report) {
        const errors = [];
        config.basicFields.forEach(function (field) {
          if (field.required && !String((report.base_info || {})[field.key] || "").trim()) {
            errors.push({ field: field.key, message: field.label + "为必填，请补充。" });
          }
        });
        config.templateItems.forEach(function (item) {
          const data = (report.item_data || {})[item.id] || {};
          const measured = String(data.measured_value || "").trim();
          if (item.record_required && !measured) {
            errors.push({ item_id: item.id, field: "measured_value", message: (item.display_step || item.step) + "：" + item.action + "，实测情况记录为必填。" });
          } else if (item.record_required && measured.length < 2) {
            errors.push({ item_id: item.id, field: "measured_value", message: (item.display_step || item.step) + "：" + item.action + "，实测情况记录过短，请补充有效描述。" });
          }
          if (item.before_required && !(data.before_images || []).length) {
            errors.push({ item_id: item.id, field: "before_images", message: (item.display_step || item.step) + "：" + item.action + "，原始状态照片必传。" });
          }
          if (item.after_required && !(data.after_images || []).length) {
            errors.push({ item_id: item.id, field: "after_images", message: (item.display_step || item.step) + "：" + item.action + "，调试或维护后照片必传。" });
          }
          ["before_images", "after_images"].forEach(function (field) {
            if ((data[field] || []).length > config.maxImagesPerField) {
              errors.push({ item_id: item.id, field: field, message: (item.display_step || item.step) + "：" + FIELD_LABELS[field] + "最多 " + config.maxImagesPerField + " 张。" });
            }
          });
        });
        return errors;
      }

      async function checkCompleteness() {
        await saveNow();
        const errors = validateReport(state.report);
        state.filter = errors.length ? "todo" : "all";
        document.querySelectorAll("[data-filter]").forEach(function (button) {
          button.classList.toggle("active", button.dataset.filter === state.filter);
        });
        state.errorMode = true;
        state.errorIndex = 0;
        state.lastValidationPassed = !errors.length;
        state.lastErrors = errors;
        if (errors[0] && errors[0].item_id) setExpandedItem(errors[0].item_id, true);
        updateStatsAndErrors(true);
        renderItems();
        if (!errors.length) {
          showToast("完整性检查通过，可以导出正式 ZIP。");
          return true;
        }
        showToast("发现 " + errors.length + " 项待补内容，已跳到第一处。");
        window.setTimeout(function () { focusErrorTarget(errors[0]); }, 80);
        return false;
      }

      function focusErrorTarget(error) {
        if (!error) return;
        if (error.item_id && state.ui.expandedItemId !== error.item_id) {
          setExpandedItem(error.item_id, true);
        }
        let target = null;
        if (!error.item_id) {
          target = document.querySelector("[name='" + error.field + "']");
        } else if (error.field === "measured_value") {
          target = document.querySelector("textarea[data-record='" + error.item_id + "']");
        } else {
          target = document.querySelector("button[data-trigger='" + error.item_id + "_" + error.field + "_camera']");
        }
        if (!target) target = document.querySelector("[data-item-id='" + (error.item_id || "") + "']");
        if (!target) return;
        target.scrollIntoView({ behavior: "smooth", block: "center" });
        window.setTimeout(function () {
          if (typeof target.focus === "function") target.focus({ preventScroll: true });
        }, 380);
      }

      function updateStatsAndErrors(showErrors) {
        const stats = computeStats(state.report);
        const errors = validateReport(state.report);
        if (showErrors || state.errorMode) state.lastErrors = errors;
        document.getElementById("statTotal").textContent = stats.total_items;
        document.getElementById("statDone").textContent = stats.completed_items;
        document.getElementById("statTodo").textContent = stats.uncompleted_items;
        document.getElementById("statMissingPhotos").textContent = stats.missing_image_count;
        document.getElementById("statAttention").textContent = stats.attention_count;
        document.getElementById("statPhotos").textContent = stats.uploaded_image_count;
        const percent = stats.total_items ? Math.round(stats.completed_items / stats.total_items * 100) : 0;
        document.getElementById("statPercent").textContent = percent + "%";
        document.getElementById("progressBar").style.width = percent + "%";
        const integrityHint = document.getElementById("integrityHint");
        if (integrityHint) {
          if (!showErrors && !state.errorMode) {
            integrityHint.textContent = "尚未检查";
            integrityHint.className = "tag";
          } else if (errors.length) {
            integrityHint.textContent = "待补 " + errors.length + " 项";
            integrityHint.className = "tag required";
          } else {
            integrityHint.textContent = "检查通过";
            integrityHint.className = "tag done";
          }
        }
        const errorPanel = document.getElementById("errorPanel");
        const filterCounts = {
          all: stats.total_items,
          todo: stats.uncompleted_items,
          photo: stats.missing_image_count,
          record: config.templateItems.filter(function (item) { return item.record_required && !String(itemData(item.id).measured_value || "").trim(); }).length,
          attention: stats.attention_count
        };
        Object.keys(filterCounts).forEach(function (key) { const node = document.getElementById("filterCount" + key.charAt(0).toUpperCase() + key.slice(1)); if (node) node.textContent = filterCounts[key]; });
        const bottomText = document.getElementById("bottomProgressText");
        const bottomDetail = document.getElementById("bottomProgressDetail");
        const bottomNext = document.getElementById("bottomNextBtn");
        bottomText.textContent = stats.completed_items + " / " + stats.total_items + " 已完成";
        bottomDetail.textContent = errors.length ? "待补 " + errors.length + " 项" : "已满足导出条件";
        const exportReady = state.lastValidationPassed && !errors.length;
        bottomNext.textContent = exportReady ? "导出正式 ZIP" : "下一待办";
        bottomNext.classList.toggle("primary", true);
        if (state.errorMode && errors.length) {
          document.getElementById("errorList").innerHTML = renderErrorGroups(errors);
          document.querySelectorAll("[data-focus-error]").forEach(function (button) {
            button.addEventListener("click", function () {
              state.errorIndex = Number(button.dataset.focusError) || 0;
              focusErrorTarget(errors[state.errorIndex]);
            });
          });
          errorPanel.classList.remove("hidden");
        } else {
          errorPanel.classList.add("hidden");
        }
      }

      async function exportZip(status) {
        await saveNow();
        const errors = validateReport(state.report);
        if (status === "final" && errors.length) {
          state.errorMode = true;
          state.lastValidationPassed = false;
          state.errorIndex = 0;
          state.lastErrors = errors;
          state.filter = "todo";
          document.querySelectorAll("[data-filter]").forEach(function (button) { button.classList.toggle("active", button.dataset.filter === "todo"); });
          if (errors[0] && errors[0].item_id) setExpandedItem(errors[0].item_id, true);
          updateStatsAndErrors(true);
          renderItems();
          showToast("正式 ZIP 未通过完整性检查，已跳到第一处待补内容。");
          window.setTimeout(function () { focusErrorTarget(errors[0]); }, 80);
          return;
        }
        const issueNo = buildIssueNo(state.report.base_info || {});
        const packageData = await buildPackageData(status, issueNo, errors);
        const packageCheck = verifyPackageData(packageData, status);
        if (!packageCheck.ok) {
          setSaveStatus("导出校验失败");
          showToast("导出前校验失败：" + packageCheck.message);
          return;
        }
        const estimated = packageData.files.reduce(function (sum, file) { return sum + Number(file.size || 0) + 120 + file.name.length * 2; }, 0);
        if (status === "final" && estimated > config.zipMaxBytes) {
          showToast("预计ZIP超过500M，请减少照片或压缩后再导出正式ZIP。");
          return;
        }
        setSaveStatus("正在生成ZIP");
        const zipBlob = await createZip(packageData.files);
        if (status === "final" && zipBlob.size > config.zipMaxBytes) {
          showToast("ZIP生成后超过500M，请减少照片后重新导出。");
          setSaveStatus("已保存 " + timeText());
          return;
        }
        const filename = (status === "draft" ? "草稿_" : "") + safeFileName(issueNo) + ".zip";
        downloadBlob(zipBlob, filename);
        state.report.last_exported_at = isoNow();
        state.report.last_issue_no = issueNo;
        await saveNow();
        showToast((status === "final" ? "正式" : "草稿") + "ZIP已导出：" + filename);
      }

      function verifyPackageData(packageData, status) {
        const files = (packageData && packageData.files) || [];
        const byName = {};
        files.forEach(function (file) { byName[file.name] = file; });
        for (const name of ["manifest.json", "report_data.json", "report.html"]) {
          if (!byName[name]) return { ok: false, message: "缺少 " + name };
        }
        try {
          const manifest = JSON.parse(String(byName["manifest.json"].data || "{}"));
          const reportData = JSON.parse(String(byName["report_data.json"].data || "{}"));
          if (manifest.format_version !== config.packageFormatVersion || reportData.format_version !== config.packageFormatVersion) {
            return { ok: false, message: "报告包版本不兼容" };
          }
          if (manifest.report_status !== status || reportData.report_status !== status) {
            return { ok: false, message: "报告状态不一致" };
          }
          if (!reportData.base_info || !Array.isArray(reportData.groups) || !reportData.groups.length) {
            return { ok: false, message: "缺少电脑端导入所需的报告数据" };
          }
          const missingImages = [];
          (reportData.groups || []).forEach(function (group) {
            (group.items || []).forEach(function (item) {
              ["before_images", "after_images"].forEach(function (field) {
                (item[field] || []).forEach(function (image) {
                  if (!image.path || !byName[image.path]) missingImages.push(image.path || "未命名图片");
                });
              });
            });
          });
          if (missingImages.length) return { ok: false, message: "有 " + missingImages.length + " 张图片未写入 ZIP" };
          if (!String(byName["report.html"].data || "").includes("免疫产品跳值问题用服工程师排查反馈报告")) {
            return { ok: false, message: "电脑端查看页生成异常" };
          }
          return { ok: true, message: "电脑端导入结构校验通过" };
        } catch (err) {
          return { ok: false, message: "报告数据无法读取" };
        }
      }

      async function buildPackageData(status, issueNo, errors) {
        const generatedAt = isoNow();
        const reportData = await buildReportData(status, issueNo, generatedAt, errors);
        const manifest = {
          format_version: config.packageFormatVersion,
          template_name: config.templateName,
          tool_version: config.version,
          app_name: config.appName,
          export_client: "mobile_offline",
          report_status: status,
          issue_no: issueNo,
          generated_at: generatedAt,
          zip_max_bytes: config.zipMaxBytes,
          summary: {
            hospital: state.report.base_info.hospital || "",
            model: state.report.base_info.model || "",
            serial: state.report.base_info.serial || ""
          },
          stats: reportData.stats
        };
        const reportHtml = buildReportHtml(reportData, manifest);
        const files = [
          { name: "manifest.json", data: JSON.stringify(manifest, null, 2), size: utf8Size(JSON.stringify(manifest)) },
          { name: "report_data.json", data: JSON.stringify(reportData, null, 2), size: utf8Size(JSON.stringify(reportData)) },
          { name: "report.html", data: reportHtml, size: utf8Size(reportHtml) }
        ];
        reportData._imageFiles.forEach(function (file) { files.push(file); });
        delete reportData._imageFiles;
        files[1].data = JSON.stringify(reportData, null, 2);
        files[1].size = utf8Size(files[1].data);
        return { files: files, reportData: reportData, manifest: manifest };
      }

      async function buildReportData(status, issueNo, generatedAt, errors) {
        const imageFiles = [];
        const groups = [{
          category: "排查步骤（1-36，第35步含4项）",
          items: []
        }];
        for (const item of config.templateItems) {
          const data = itemData(item.id);
          const reportItem = Object.assign({}, item, {
            measured_value: data.measured_value || "",
            conclusion: data.conclusion || "正常",
            conclusion_class: conclusionClass(data.conclusion || "正常"),
            short_description_warning: isShortDescription(data.measured_value || ""),
            before_images: [],
            after_images: []
          });
          for (const field of ["before_images", "after_images"]) {
            const label = FIELD_LABELS[field];
            let index = 1;
            for (const image of data[field] || []) {
              const row = await dbGet(PHOTO_STORE, image.photo_id);
              if (!row || !row.blob) continue;
              const ext = "jpg";
              const path = "images/" + safeFileName((state.report.base_info.hospital || "医院") + "_" + (state.report.base_info.serial || "序列号") + "_" + (item.display_step || item.step || item.id) + "_" + label + "_" + index) + "." + ext;
              reportItem[field].push({
                path: path,
                original_name: image.original_name || path.split("/").pop(),
                size: row.blob.size,
                original_size: image.original_size || row.blob.size,
                compressed: Boolean(image.compressed)
              });
              imageFiles.push({ name: path, data: row.blob, size: row.blob.size });
              index += 1;
            }
          }
          groups[0].items.push(reportItem);
        }
        const stats = computeStats(state.report);
        stats.passed = status === "draft" ? !errors.length : true;
        const attentionItems = groups[0].items.filter(function (item) {
          return ["异常", "已处理", "待确认"].includes(item.conclusion);
        });
        return {
          format_version: config.packageFormatVersion,
          report_status: status,
          base_info: Object.assign({}, state.report.base_info, { issue_no: issueNo }),
          issue_no: issueNo,
          stats: stats,
          warnings: [],
          errors: status === "draft" ? errors : [],
          groups: groups,
          attention_items: attentionItems,
          generated_at: generatedAt,
          _imageFiles: imageFiles
        };
      }

      async function createZip(files) {
        const encoder = new TextEncoder();
        const localParts = [];
        const centralParts = [];
        let offset = 0;
        for (const file of files) {
          const nameBytes = encoder.encode(file.name.replace(/\\/g, "/"));
          const dataBytes = await dataToBytes(file.data);
          const crc = crc32(dataBytes);
          const mod = dosDateTime(new Date());
          const localHeader = new Uint8Array(30);
          write32(localHeader, 0, 0x04034b50);
          write16(localHeader, 4, 20);
          write16(localHeader, 6, 0x0800);
          write16(localHeader, 8, 0);
          write16(localHeader, 10, mod.time);
          write16(localHeader, 12, mod.date);
          write32(localHeader, 14, crc);
          write32(localHeader, 18, dataBytes.length);
          write32(localHeader, 22, dataBytes.length);
          write16(localHeader, 26, nameBytes.length);
          write16(localHeader, 28, 0);
          localParts.push(localHeader, nameBytes, dataBytes);

          const central = new Uint8Array(46);
          write32(central, 0, 0x02014b50);
          write16(central, 4, 20);
          write16(central, 6, 20);
          write16(central, 8, 0x0800);
          write16(central, 10, 0);
          write16(central, 12, mod.time);
          write16(central, 14, mod.date);
          write32(central, 16, crc);
          write32(central, 20, dataBytes.length);
          write32(central, 24, dataBytes.length);
          write16(central, 28, nameBytes.length);
          write16(central, 30, 0);
          write16(central, 32, 0);
          write16(central, 34, 0);
          write16(central, 36, 0);
          write32(central, 38, 0);
          write32(central, 42, offset);
          centralParts.push(central, nameBytes);
          offset += localHeader.length + nameBytes.length + dataBytes.length;
        }
        const centralSize = centralParts.reduce(function (sum, part) { return sum + part.length; }, 0);
        const centralOffset = offset;
        const end = new Uint8Array(22);
        write32(end, 0, 0x06054b50);
        write16(end, 8, files.length);
        write16(end, 10, files.length);
        write32(end, 12, centralSize);
        write32(end, 16, centralOffset);
        write16(end, 20, 0);
        return new Blob(localParts.concat(centralParts, [end]), { type: "application/zip" });
      }

      async function dataToBytes(data) {
        if (data instanceof Uint8Array) return data;
        if (data instanceof Blob) return new Uint8Array(await data.arrayBuffer());
        return new TextEncoder().encode(String(data == null ? "" : data));
      }

      function write16(bytes, offset, value) {
        bytes[offset] = value & 255;
        bytes[offset + 1] = (value >>> 8) & 255;
      }

      function write32(bytes, offset, value) {
        bytes[offset] = value & 255;
        bytes[offset + 1] = (value >>> 8) & 255;
        bytes[offset + 2] = (value >>> 16) & 255;
        bytes[offset + 3] = (value >>> 24) & 255;
      }

      function dosDateTime(date) {
        return {
          time: (date.getHours() << 11) | (date.getMinutes() << 5) | Math.floor(date.getSeconds() / 2),
          date: ((date.getFullYear() - 1980) << 9) | ((date.getMonth() + 1) << 5) | date.getDate()
        };
      }

      const crcTable = (function () {
        const table = new Uint32Array(256);
        for (let n = 0; n < 256; n += 1) {
          let c = n;
          for (let k = 0; k < 8; k += 1) c = c & 1 ? 0xedb88320 ^ (c >>> 1) : c >>> 1;
          table[n] = c >>> 0;
        }
        return table;
      })();

      function crc32(bytes) {
        let crc = 0xffffffff;
        for (let i = 0; i < bytes.length; i += 1) crc = crcTable[(crc ^ bytes[i]) & 255] ^ (crc >>> 8);
        return (crc ^ 0xffffffff) >>> 0;
      }

      function downloadBlob(blob, filename) {
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        link.remove();
        setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
      }

      function buildIssueNo(base) {
        return [base.hospital || "医院", base.model || "机型", base.serial || "序列号"].join("*") + "_" + compactTimestamp();
      }

      function compactTimestamp() {
        const now = new Date();
        const pad = function (value) { return String(value).padStart(2, "0"); };
        return now.getFullYear() + pad(now.getMonth() + 1) + pad(now.getDate()) + pad(now.getHours()) + pad(now.getMinutes()) + pad(now.getSeconds());
      }

      function cleanFileBase(name) {
        return String(name || "photo").replace(/\.[^.]+$/, "").replace(/[^\w\u4e00-\u9fff-]+/g, "_").slice(0, 48) || "photo";
      }

      function safeFileName(value) {
        return String(value || "未命名").replace(/[<>:"/\\|?*\r\n\t]+/g, "_").replace(/\s+/g, "_").replace(/^\.+|\.+$/g, "").slice(0, 120) || "未命名";
      }

      function conclusionClass(value) {
        if (value === "异常") return "abnormal";
        if (value === "已处理") return "handled";
        if (value === "待确认") return "pending";
        return "normal";
      }

      function isShortDescription(value) {
        const compact = String(value || "").replace(/\s+/g, "");
        if (!compact) return false;
        return ["正常", "无", "无异常", "OK", "ok", "已完成", "符合", "没问题", "良好", "通过"].includes(compact) || compact.length < 8;
      }

      function utf8Size(value) {
        return new TextEncoder().encode(String(value == null ? "" : value)).length;
      }

      function isoNow() {
        const now = new Date();
        const pad = function (value) { return String(value).padStart(2, "0"); };
        return now.getFullYear() + "-" + pad(now.getMonth() + 1) + "-" + pad(now.getDate()) + " " + pad(now.getHours()) + ":" + pad(now.getMinutes()) + ":" + pad(now.getSeconds());
      }

      function timeText() {
        const now = new Date();
        return String(now.getHours()).padStart(2, "0") + ":" + String(now.getMinutes()).padStart(2, "0") + ":" + String(now.getSeconds()).padStart(2, "0");
      }

      function formatDateTime(value) {
        if (!value) return "—";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return String(value).replace("T", " ").slice(0, 19);
        return date.getFullYear() + "-" + String(date.getMonth() + 1).padStart(2, "0") + "-" + String(date.getDate()).padStart(2, "0") + " " + String(date.getHours()).padStart(2, "0") + ":" + String(date.getMinutes()).padStart(2, "0");
      }

      function setSaveStatus(text, status) {
        const node = document.getElementById("saveStatus");
        node.textContent = text;
        node.classList.toggle("saving", status === "saving" || /保存中|处理照片|生成ZIP/.test(text));
        node.classList.toggle("error", status === "error" || /失败/.test(text));
      }

      function showToast(text) {
        const node = document.getElementById("toast");
        node.textContent = text;
        node.classList.remove("hidden");
        clearTimeout(showToast.timer);
        showToast.timer = setTimeout(function () { node.classList.add("hidden"); }, 2800);
      }

      function escapeHtml(value) {
        return String(value == null ? "" : value).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
      }
    })();
  </script>
</body>
</html>
