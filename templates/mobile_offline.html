<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>离线一线采集｜免疫跳值排查反馈报告生成工具 V1.4</title>
  <style>
    :root {
      --bg: #f5f7f8;
      --panel: #ffffff;
      --line: #dce3e7;
      --text: #17212b;
      --muted: #697582;
      --accent: #0d6b68;
      --accent-soft: #e5f3f1;
      --danger: #b42318;
      --warn: #b7791f;
      --ok: #087443;
      --shadow: 0 14px 36px rgba(19, 32, 41, .08);
    }
    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
      font-size: 16px;
      line-height: 1.5;
      letter-spacing: 0;
    }
    button, input, textarea, select { font: inherit; }
    button {
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      padding: 0 12px;
      cursor: pointer;
    }
    button.primary { border-color: var(--accent); background: var(--accent); color: #fff; font-weight: 700; }
    button.warn { border-color: #f0c36a; background: #fff8e7; color: #8a5b00; }
    button.danger { border-color: #f7b8b0; background: #fff1ef; color: var(--danger); }
    button:disabled { opacity: .55; cursor: not-allowed; }
    .app-header {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 14px;
      background: rgba(255, 255, 255, .96);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }
    .app-header h1 { margin: 0; font-size: 18px; line-height: 1.25; }
    .app-header p { margin: 3px 0 0; color: var(--muted); font-size: 12px; }
    .status-pill {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      border-radius: 999px;
      padding: 0 10px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }
    .shell { width: min(1040px, calc(100vw - 20px)); margin: 14px auto 40px; display: grid; gap: 14px; }
    .card { border: 1px solid var(--line); border-radius: 14px; background: var(--panel); box-shadow: var(--shadow); overflow: hidden; }
    .card-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 15px 16px; border-bottom: 1px solid var(--line); background: linear-gradient(180deg, #ffffff, #f8fbfb); }
    .card-head h2 { margin: 0; font-size: 17px; }
    .card-body { padding: 16px; }
    .notice { border-left: 4px solid var(--accent); background: #f4fbfa; color: #214744; padding: 10px 12px; line-height: 1.55; }
    .notice.warn { border-color: var(--warn); background: #fff8e8; color: #6f4d11; }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .report-actions { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .report-actions button { width: 100%; }
    .helper-text { margin: 0 0 12px; color: var(--muted); font-size: 13px; line-height: 1.6; }
    .autosave-note { display: flex; align-items: center; gap: 7px; margin-top: 12px; color: var(--muted); font-size: 12px; line-height: 1.5; }
    .autosave-note::before { content: ""; width: 8px; height: 8px; flex: 0 0 auto; border-radius: 50%; background: var(--ok); box-shadow: 0 0 0 3px #e9f8f0; }
    .report-list-head { display: flex; justify-content: space-between; gap: 10px; align-items: baseline; margin: 18px 0 8px; }
    .report-list-head h3 { margin: 0; font-size: 14px; }
    .report-list-head span { color: var(--muted); font-size: 12px; }
    .draft-grid { display: grid; gap: 8px; }
    .draft-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fff;
    }
    .draft-row strong { display: block; line-height: 1.4; }
    .draft-row span { display: block; color: var(--muted); font-size: 12px; line-height: 1.5; }
    .basic-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }
    .field { display: grid; gap: 6px; }
    .field.problem { grid-column: 1 / -1; }
    .field span { color: var(--muted); font-size: 12px; }
    .field b { color: var(--danger); margin-left: 2px; }
    input, textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      padding: 10px 11px;
      min-height: 42px;
    }
    textarea { resize: vertical; line-height: 1.55; }
    input.has-error, textarea.has-error { border-color: var(--danger); background: #fff8f7; }
    .stats-grid { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 1px; background: var(--line); }
    .stat { min-height: 76px; background: #fff; padding: 12px; }
    .stat span { display: block; color: var(--muted); font-size: 12px; margin-bottom: 5px; }
    .stat strong { font-size: 20px; }
    .progress-track { height: 8px; border-radius: 999px; background: #e8eef1; overflow: hidden; margin-top: 8px; }
    .progress-track i { display: block; height: 100%; width: 0; background: var(--accent); }
    .filter-panel { padding: 14px; border-bottom: 1px solid var(--line); background: linear-gradient(180deg, #fbfdfd, #fff); }
    .filter-heading { display: flex; justify-content: space-between; align-items: end; gap: 12px; margin-bottom: 11px; }
    .filter-heading span { display: block; color: var(--muted); font-size: 12px; }
    .filter-heading strong { display: block; margin-top: 2px; font-size: 16px; }
    .filter-heading .filter-tip { max-width: 160px; text-align: right; line-height: 1.4; }
    .filter-bar { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 8px; }
    .filter-bar button { min-height: 64px; padding: 9px 10px; border-radius: 10px; background: #fff; text-align: left; transition: border-color .15s, background .15s, transform .15s; }
    .filter-bar button:hover { border-color: #9dc9c4; background: #f6fbfa; }
    .filter-bar button b, .filter-bar button small { display: block; }
    .filter-bar button b { font-size: 14px; }
    .filter-bar button small { margin-top: 4px; color: var(--muted); font-size: 11px; line-height: 1.25; }
    .filter-bar button.active { border-color: var(--accent); background: var(--accent); color: #fff; box-shadow: 0 7px 16px rgba(13,107,104,.2); }
    .filter-bar button.active small { color: #d9f2ee; }
    .item-list { display: grid; gap: 10px; padding: 12px; }
    .item-card { border: 1px solid var(--line); border-radius: 12px; background: #fff; overflow: hidden; }
    .item-card.has-error { border-color: #efb0a8; }
    .item-card.is-done { border-color: #b9dfce; }
    .item-head { display: flex; justify-content: space-between; gap: 10px; padding: 13px 12px 12px; border-bottom: 1px solid var(--line); background: #fbfcfd; }
    .item-head h3 { margin: 0; font-size: 16px; line-height: 1.45; }
    .item-head p { margin: 4px 0 0; color: var(--muted); font-size: 13px; line-height: 1.45; }
    .requirement-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 9px; }
    .requirement-tag { display: inline-flex; align-items: center; min-height: 23px; border-radius: 999px; padding: 0 8px; font-size: 11px; font-weight: 700; }
    .requirement-tag.required { background: #fff0ee; color: var(--danger); }
    .requirement-tag.optional { background: #eff4f6; color: #5f6d79; }
    .tag { display: inline-flex; align-items: center; height: 24px; border-radius: 999px; padding: 0 8px; background: #eef3f4; color: var(--muted); font-size: 12px; font-weight: 700; white-space: nowrap; }
    .tag.required { background: #fff1ef; color: var(--danger); }
    .tag.done { background: #ecfdf3; color: var(--ok); }
    .item-body { display: grid; gap: 10px; padding: 12px; }
    .detail { border: 1px solid var(--line); border-radius: 8px; padding: 10px; background: #fff; }
    .detail span { display: block; color: var(--muted); font-size: 12px; margin-bottom: 5px; }
    .detail p { margin: 0; white-space: pre-wrap; line-height: 1.55; }
    .item-reference { border: 1px solid #d7e7e5; border-radius: 9px; padding: 10px; background: #f7fbfa; }
    .item-reference-title { margin: 0 0 9px; color: #255d58; font-size: 14px; font-weight: 700; }
    .item-reference .detail { margin: 0 10px 10px; background: #fff; }
    .item-reference .detail:last-child { margin-bottom: 0; }
    .record-grid { display: grid; grid-template-columns: minmax(0, 1fr) 170px; gap: 10px; }
    .photo-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .photo-box { border: 1px solid var(--line); border-radius: 8px; padding: 10px; background: #fff; }
    .photo-head { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 8px; }
    .photo-head > span { color: var(--muted); font-size: 12px; }
    .field-heading { display: flex; align-items: center; flex-wrap: wrap; gap: 6px; color: var(--text); font-size: 13px; font-weight: 700; }
    .field-kind { display: inline-flex; align-items: center; min-height: 21px; border-radius: 999px; padding: 0 7px; font-size: 11px; font-weight: 700; line-height: 1; }
    .field-kind.required { background: #fff0ee; color: var(--danger); }
    .field-kind.optional { background: #eef3f5; color: #62707b; }
    .field-note { margin: 5px 0 0; color: var(--muted); font-size: 11px; line-height: 1.4; }
    .photo-actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .photo-actions input { display: none; }
    .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(86px, 1fr)); gap: 8px; }
    .thumb { position: relative; height: 86px; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; background: #f8fafb; }
    .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .thumb button { position: absolute; right: 4px; top: 4px; min-height: 26px; height: 26px; border-radius: 999px; padding: 0 8px; background: rgba(255,255,255,.92); color: var(--danger); }
    .empty { color: var(--muted); border: 1px dashed var(--line); border-radius: 8px; min-height: 58px; display: grid; place-items: center; font-size: 13px; }
    .errors { display: grid; gap: 7px; }
    .error-line { width: 100%; min-height: 0; border: 1px solid #f3b5ae; border-radius: 8px; background: #fff5f3; color: var(--danger); padding: 9px 10px; line-height: 1.5; text-align: left; }
    .error-line::after { content: "定位填写处 ›"; display: block; margin-top: 3px; color: #8d241b; font-size: 12px; font-weight: 700; }
    .toast { position: fixed; left: 50%; bottom: 18px; transform: translateX(-50%); z-index: 30; max-width: min(560px, calc(100vw - 24px)); border-radius: 999px; background: rgba(22,32,42,.94); color: #fff; padding: 10px 14px; box-shadow: var(--shadow); }
    .hidden { display: none !important; }
    @media (max-width: 760px) {
      body { padding-bottom: env(safe-area-inset-bottom); }
      .app-header { align-items: flex-start; padding: 14px 16px; }
      .app-header h1 { font-size: 20px; }
      .app-header p { max-width: 250px; line-height: 1.45; }
      .shell { width: min(100% - 20px, 640px); margin-top: 12px; gap: 12px; }
      .card { border-radius: 14px; }
      .card-head, .card-body { padding-left: 14px; padding-right: 14px; }
      .basic-grid, .stats-grid, .record-grid, .photo-row { grid-template-columns: 1fr; }
      .basic-grid { gap: 14px; }
      .field span { font-size: 16px; }
      input, textarea, select { min-height: 46px; font-size: 16px; }
      .field.problem textarea { min-height: 104px; }
      .stats-grid { border-top: 0; }
      .stat { min-height: 52px; display: flex; align-items: center; justify-content: space-between; padding: 11px 14px; }
      .stat span { margin: 0; }
      .stat .progress-track { width: 42%; margin: 0 0 0 10px; }
      .draft-row { grid-template-columns: 1fr; padding: 12px; }
      .draft-row .actions { display: grid; grid-template-columns: 1fr 1fr; }
      .draft-row .actions button { width: 100%; }
      .report-actions { grid-template-columns: 1fr 1fr; }
      .report-actions .primary { grid-column: 1 / -1; }
      .filter-panel { padding: 14px; }
      .filter-bar { grid-template-columns: 1fr 1fr; }
      .filter-bar button:first-child { grid-column: 1 / -1; min-height: 52px; display: grid; grid-template-columns: 1fr auto; align-items: center; column-gap: 10px; }
      .filter-bar button:first-child small { margin: 0; text-align: right; }
      .filter-bar button { min-height: 60px; }
      .item-list { padding: 10px; gap: 10px; }
      .item-head { padding: 12px; }
      .item-head h3 { font-size: 17px; }
      .item-head p { font-size: 14px; }
      .item-body { padding: 12px; gap: 12px; }
      .item-reference-title { font-size: 16px; }
      .item-reference .detail span { font-size: 14px; }
      .item-reference .detail p { font-size: 16px; line-height: 1.65; }
      .field-heading { font-size: 16px; }
      .field-kind { font-size: 11px; }
      .field-note { font-size: 13px; }
      .photo-actions { display: grid; grid-template-columns: 1fr 1fr; }
      .photo-actions button { width: 100%; }
    }

    /* V3 mobile task-flow redesign */
    :root { --surface: #ffffff; --surface-soft: #f7faf9; --border-soft: #dce6e5; --accent-ink: #075e5b; --warning: #b45309; }
    body { padding-bottom: calc(84px + env(safe-area-inset-bottom)); }
    button:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible { outline: 3px solid rgba(13,107,104,.28); outline-offset: 2px; }
    .app-header { min-height: 60px; padding: 8px 14px; box-shadow: 0 2px 12px rgba(20,45,48,.08); }
    .app-header h1 { font-size: 17px; }
    .app-header p { max-width: 220px; overflow: hidden; color: var(--muted); font-size: 12px; text-overflow: ellipsis; white-space: nowrap; }
    .header-context { min-width: 0; }
    .status-pill { gap: 6px; min-height: 30px; font-size: 12px; }
    .status-pill::before { content: ""; width: 7px; height: 7px; flex: 0 0 auto; border-radius: 50%; background: currentColor; }
    .status-pill.saving { background: #fff7e6; color: var(--warning); }
    .status-pill.error { background: #fff1ef; color: var(--danger); }
    .shell { width: min(920px, calc(100vw - 20px)); margin-top: 10px; gap: 10px; }
    .card { border-radius: 12px; box-shadow: none; }
    .card-head { min-height: 50px; padding: 12px 14px; }
    .notice-card { box-shadow: none; }
    .notice-card .card-body { padding: 10px 12px; }
    .notice { display: flex; align-items: flex-start; gap: 10px; border-left: 0; border-radius: 9px; padding: 9px 10px; font-size: 13px; }
    .notice-copy { flex: 1; line-height: 1.5; }
    .notice button { min-height: 32px; padding: 0 9px; font-size: 12px; }
    .notice.hidden { display: none; }
    .report-summary { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 10px; align-items: center; padding: 14px; }
    .report-summary h2 { margin: 0; font-size: 16px; }
    .report-summary p { margin: 4px 0 0; color: var(--muted); font-size: 13px; line-height: 1.4; }
    .report-actions-inline { display: flex; flex-wrap: wrap; gap: 7px; }
    .report-actions-inline button { min-height: 38px; font-size: 13px; }
    .more-menu { position: relative; }
    .more-menu-panel { position: absolute; right: 0; top: calc(100% + 6px); z-index: 30; display: grid; min-width: 150px; gap: 4px; padding: 6px; border: 1px solid var(--border-soft); border-radius: 10px; background: #fff; box-shadow: 0 14px 32px rgba(18,40,43,.16); }
    .more-menu-panel button { min-height: 38px; border: 0; text-align: left; }
    .drawer-backdrop { position: fixed; inset: 0; z-index: 60; background: rgba(12,25,29,.42); }
    .report-drawer { position: fixed; right: 0; bottom: 0; left: 0; z-index: 61; max-height: min(80vh, 680px); display: grid; grid-template-rows: auto minmax(0, 1fr); border-radius: 18px 18px 0 0; background: #fff; box-shadow: 0 -14px 38px rgba(12,25,29,.2); }
    .drawer-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 14px 16px 10px; border-bottom: 1px solid var(--border-soft); }
    .drawer-head h2 { margin: 0; font-size: 17px; }
    .drawer-head button { min-height: 38px; }
    .drawer-list { overflow: auto; padding: 10px 12px calc(14px + env(safe-area-inset-bottom)); }
    .draft-grid { gap: 8px; }
    .draft-row { grid-template-columns: minmax(0, 1fr) auto; padding: 12px; border-radius: 10px; }
    .draft-row .actions { align-items: center; }
    .draft-row .danger { border: 0; background: transparent; color: var(--danger); font-size: 12px; }
    .base-card .card-body { padding: 0; }
    .base-summary { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; padding: 14px; }
    .base-summary strong { display: block; font-size: 15px; }
    .base-summary p { margin: 4px 0 0; color: var(--muted); font-size: 13px; line-height: 1.5; }
    .base-summary button { min-height: 38px; white-space: nowrap; }
    .base-editor { padding: 14px; border-top: 1px solid var(--border-soft); }
    .field-group-title { grid-column: 1 / -1; margin-top: 4px; color: var(--accent-ink); font-size: 13px; font-weight: 700; }
    .basic-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .basic-grid .problem { grid-column: 1 / -1; }
    .basic-grid .field { gap: 5px; }
    .basic-grid .field span { font-size: 13px; }
    .basic-grid input, .basic-grid textarea { min-height: 44px; padding: 9px 10px; font-size: 16px; }
    .progress-card .card-body { padding: 14px; }
    .progress-main { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; }
    .progress-main strong { font-size: 20px; }
    .progress-main span { color: var(--muted); font-size: 13px; }
    .progress-meta { margin-top: 8px; color: var(--muted); font-size: 13px; }
    .progress-actions { display: flex; gap: 8px; margin-top: 12px; }
    .progress-actions button { min-height: 40px; font-size: 13px; }
    .filter-panel { position: sticky; top: 60px; z-index: 15; padding: 7px 10px; border-bottom: 1px solid var(--border-soft); background: rgba(255,255,255,.97); }
    .filter-heading { display: none; }
    .filter-bar { display: flex; gap: 7px; overflow-x: auto; scrollbar-width: none; }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-bar button, .filter-bar button:first-child { display: inline-flex; min-width: max-content; min-height: 38px; align-items: center; gap: 5px; padding: 0 10px; border-radius: 999px; white-space: nowrap; }
    .filter-bar button b { font-size: 13px; }
    .filter-bar button small { margin: 0; color: var(--muted); font-size: 12px; }
    .filter-bar button.active small { color: #d9f2ee; }

    .item-card.is-done { border-color: var(--border-soft); }
    .item-card.is-done::before { background: var(--ok); }
    .item-card.has-error::before { background: var(--danger); }
    .item-card.attention::before { background: #d97706; }
    .item-head { display: block; padding: 0; border: 0; background: #fff; }
    .item-toggle { width: 100%; min-height: 72px; display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 8px; padding: 11px 12px 11px 16px; border: 0; border-radius: 11px; background: transparent; text-align: left; }
    .item-toggle h3 { margin: 0; font-size: 15px; line-height: 1.4; }
    .item-toggle p { margin: 4px 0 0; font-size: 12px; }
    .item-toggle .task-summary { margin-top: 5px; color: var(--muted); font-size: 12px; line-height: 1.35; }
    .item-toggle .tag { align-self: start; }
    .item-body { display: none; gap: 12px; padding: 0 12px 14px 16px; border-top: 1px solid var(--border-soft); }
    .item-card.open .item-body { display: grid; }
    .item-reference { padding: 0; border: 0; background: transparent; }
    .reference-toggle { width: 100%; min-height: 42px; display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 0 10px; border-color: #cfe2df; background: #f4faf9; color: #245d58; font-size: 13px; font-weight: 700; text-align: left; }
    .reference-content { display: none; gap: 8px; margin-top: 8px; }
    .reference-content.open { display: grid; }
    .item-reference .detail { margin: 0; padding: 10px; background: #f9fbfb; }
    .item-reference .detail span { font-size: 12px; }
    .item-reference .detail p { font-size: 14px; line-height: 1.55; }
    .record-grid { grid-template-columns: 1fr; gap: 10px; }
    .record-grid textarea { min-height: 112px; }
    .conclusion-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 5px; }
    .conclusion-grid button { min-height: 42px; padding: 0 8px; font-size: 14px; }
    .conclusion-grid button.selected::after { margin-left: 4px; content: "✓"; }
    .conclusion-grid [data-value="正常"].selected { border-color: var(--ok); background: #ecfdf3; color: #075f36; }
    .conclusion-grid [data-value="异常"].selected { border-color: var(--danger); background: #fff1ef; color: var(--danger); }
    .conclusion-grid [data-value="已处理"].selected { border-color: #d97706; background: #fff7e9; color: #9a5b00; }
    .conclusion-grid [data-value="待确认"].selected { border-color: #8377b5; background: #f5f3ff; color: #5e5688; }
    .photo-row { grid-template-columns: 1fr; gap: 9px; }
    .photo-box { padding: 10px; border-radius: 10px; }
    .photo-actions { display: flex; gap: 8px; }
    .photo-actions label { flex: 1; }
    .photo-actions button { min-height: 42px; }
    .photo-actions label:first-child button { border-color: var(--accent); background: var(--accent); color: #fff; }
    .photo-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .thumb { height: 96px; }
    .thumb button { min-width: 40px; min-height: 40px; top: 2px; right: 2px; }
    .photo-empty { margin-top: 8px; color: var(--muted); font-size: 12px; }
    .photo-status { margin-top: 7px; color: var(--ok); font-size: 12px; }
    .photo-error { margin-top: 7px; color: var(--danger); font-size: 12px; }
    .photo-actions button:disabled { opacity: .55; }
    .error-summary { display: grid; gap: 8px; }
    .error-group { border: 1px solid #f2c3bd; border-radius: 9px; overflow: hidden; }
    .error-group summary { padding: 10px; color: var(--danger); font-size: 13px; font-weight: 700; cursor: pointer; }
    .error-group .errors { padding: 0 8px 8px; }
    .bottom-bar { position: fixed; right: 0; bottom: 0; left: 0; z-index: 45; display: grid; grid-template-columns: minmax(0, 1fr) auto auto; gap: 8px; align-items: center; min-height: 72px; padding: 10px 12px calc(10px + env(safe-area-inset-bottom)); border-top: 1px solid var(--border-soft); background: rgba(255,255,255,.98); box-shadow: 0 -5px 20px rgba(20,45,48,.1); }
    .bottom-progress { min-width: 0; }
    .bottom-progress strong { display: block; font-size: 13px; }
    .bottom-progress span { display: block; overflow: hidden; color: var(--muted); font-size: 11px; text-overflow: ellipsis; white-space: nowrap; }
    .bottom-bar button { min-height: 44px; padding: 0 11px; font-size: 13px; white-space: nowrap; }
    .image-viewer { position: fixed; inset: 0; z-index: 80; display: grid; grid-template-rows: auto minmax(0, 1fr); background: rgba(6,14,17,.95); }
    .image-viewer-bar { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 10px; color: #fff; }
    .image-viewer-bar button { min-height: 40px; border-color: rgba(255,255,255,.35); background: rgba(255,255,255,.1); color: #fff; }
    .image-viewer-stage { display: grid; place-items: center; min-height: 0; padding: 10px 16px calc(16px + env(safe-area-inset-bottom)); }
    .image-viewer-stage img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .thumb button.thumb-open { position: absolute; inset: 0; width: 100%; height: 100%; min-width: 0; min-height: 0; padding: 0; border: 0; border-radius: 0; background: transparent; }
    .thumb button.thumb-open img { width: 100%; height: 100%; object-fit: cover; }
    .thumb button:not(.thumb-open) { z-index: 1; }
    .conclusion-grid button.selected { border-color: var(--accent); background: #e8f6f4; color: var(--accent-ink); }
    .conclusion-grid button.selected::after { margin-left: 4px; content: "✓"; }
    .input-hint { min-height: 15px; color: var(--warning); font-size: 12px; }
    .error-nav { display: flex; gap: 8px; margin-bottom: 8px; }
    @media (max-width: 640px) {
      .shell { width: calc(100vw - 16px); }
      .app-header { padding-right: 10px; padding-left: 10px; }
      .app-header p { max-width: 185px; }
      .basic-grid { grid-template-columns: 1fr; }
      .basic-grid .problem { grid-column: auto; }
      .report-summary { grid-template-columns: 1fr; }
      .report-actions-inline { display: grid; grid-template-columns: 1fr 1fr 1fr; }
      .report-actions-inline button { padding: 0 7px; }
    }
    @media (min-width: 961px) {
      .shell { grid-template-columns: 300px minmax(0, 1fr); align-items: start; }
      .notice-card, .report-card, .base-card, .progress-card { grid-column: 1; }
      .items-card { grid-column: 2; grid-row: 1 / span 4; }
      .filter-panel { top: 60px; }
      .basic-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="header-context">
      <h1>离线一线采集</h1>
      <p id="headerReportSubtitle">当前报告：未填写医院 / 未填写型号</p>
    </div>
    <span id="saveStatus" class="status-pill" role="status" aria-live="polite">正在初始化</span>
  </header>

  <main class="shell">
    <section class="card notice-card" id="noticeCard">
      <div class="card-body">
        <div id="browserNotice" class="notice">
          <span class="notice-copy">本文件可离线填写，数据会自动保存在当前手机浏览器中。建议使用 Safari、Chrome、Edge 或手机系统浏览器打开。</span>
          <button id="dismissNoticeBtn" type="button" aria-label="关闭提示">知道了</button>
        </div>
      </div>
    </section>

    <section class="card report-card">
      <div class="report-summary">
        <div>
          <h2 id="currentDraftLabel">正在加载</h2>
          <p id="currentReportMeta">本机自动缓存中</p>
        </div>
        <div class="report-actions-inline">
          <button id="switchReportBtn" type="button">切换报告</button>
          <button id="newDraftBtn" type="button">新建</button>
          <div class="more-menu">
            <button id="moreMenuBtn" type="button" aria-haspopup="true" aria-expanded="false">更多</button>
            <div id="moreMenuPanel" class="more-menu-panel hidden">
              <button id="saveNowBtn" type="button">立即保存</button>
              <button id="showUsageBtn" type="button">查看使用说明</button>
              <button id="exportFinalBtn" type="button">导出正式 ZIP</button>
              <button id="deleteCurrentBtn" type="button" class="danger">删除当前报告</button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="card base-card">
      <div class="card-head"><h2>基础信息</h2><button id="baseEditBtn" type="button" class="secondary">收起</button></div>
      <div class="card-body">
        <div id="baseSummary" class="base-summary hidden"></div>
        <div id="baseEditor" class="base-editor">
        <form id="baseForm" class="basic-grid">
          <div class="field-group-title">医院与设备</div>
          
            <label class="field hospital" for="base_hospital">
              <span>医院名称<b>*</b></span>
              
                <input id="base_hospital" name="hospital" type="text" placeholder="请输入医院全称" data-required="1">
              
            </label>
          
            <label class="field model" for="base_model">
              <span>设备型号<b>*</b></span>
              
                <input id="base_model" name="model" type="text" placeholder="例如 CL-6000i" data-required="1">
              
            </label>
          
            <label class="field serial" for="base_serial">
              <span>设备序列号<b>*</b></span>
              
                <input id="base_serial" name="serial" type="text" placeholder="请输入设备 SN" data-required="1">
              
            </label>
          
            <label class="field software" for="base_software">
              <span>软件版本<b>*</b></span>
              
                <input id="base_software" name="software" type="text" placeholder="例如 V5.0.0" data-required="1">
              
            </label>
          
            <div class="field-group-title">故障与排查</div>
            <label class="field jump_project" for="base_jump_project">
              <span>跳值项目<b>*</b></span>
              
                <input id="base_jump_project" name="jump_project" type="text" placeholder="例如 TSH、FT4" data-required="1">
              
            </label>
          
            <label class="field problem" for="base_problem">
              <span>问题描述<b>*</b></span>
              
                <textarea id="base_problem" name="problem" rows="3" placeholder="请简要描述跳值现象、出现时间和频率" data-required="1"></textarea>
              
            </label>
          
            <div class="field-group-title">人员与时间</div>
            <label class="field engineer" for="base_engineer">
              <span>排查工程师<b>*</b></span>
              
                <input id="base_engineer" name="engineer" type="text" placeholder="请输入排查工程师姓名" data-required="1">
              
            </label>
          
            <label class="field check_date" for="base_check_date">
              <span>排查日期<b>*</b></span>
              
                <input id="base_check_date" name="check_date" type="date" data-required="1">
              
            </label>
          
            <label class="field contact" for="base_contact">
              <span>联系方式</span>
              
                <input id="base_contact" name="contact" type="tel" inputmode="tel" autocomplete="tel" placeholder="选填" data-required="0">
              
            </label>
          
        </form>
        </div>
      </div>
    </section>

    <section class="card" id="progressCard">
      <div class="card-head"><h2>填写进度</h2><span id="integrityHint" class="tag">尚未检查</span></div>
      <div class="card-body">
        <div class="progress-main"><strong><span id="statDone">0</span> / <span id="statTotal">0</span> 已完成</strong><span id="statPercent">0%</span></div>
        <div class="progress-track"><i id="progressBar"></i></div>
        <p class="progress-meta">待完成 <b id="statTodo">0</b> · 缺照片 <b id="statMissingPhotos">0</b> · 异常关注 <b id="statAttention">0</b> · 照片 <b id="statPhotos">0</b></p>
        <div class="progress-actions">
          <button id="nextTodoTopBtn" type="button">下一处待补</button>
          <button id="showErrorSummaryBtn" type="button" class="secondary">查看问题汇总</button>
        </div>
      </div>
      <div id="errorPanel" class="card-body hidden">
        <div class="error-nav"><button id="prevErrorBtn" type="button" class="secondary">上一处</button><button id="nextErrorBtn" type="button" class="secondary">下一处</button></div>
        <div id="errorList" class="error-summary"></div>
      </div>
    </section>

    <section class="card items-card">
      <div class="filter-panel">
        <div class="filter-heading">
          <div><span>快速定位</span><strong>填写明细</strong></div>
          <span class="filter-tip">按问题类型只看需要处理的步骤</span>
        </div>
        <div class="filter-bar" role="tablist" aria-label="填写状态筛选">
          <button type="button" class="active" data-filter="all" role="tab"><b>全部</b><small id="filterCountAll">0</small></button>
          <button type="button" data-filter="todo" role="tab"><b>未完成</b><small id="filterCountTodo">0</small></button>
          <button type="button" data-filter="photo" role="tab"><b>缺照片</b><small id="filterCountPhoto">0</small></button>
          <button type="button" data-filter="record" role="tab"><b>缺记录</b><small id="filterCountRecord">0</small></button>
          <button type="button" data-filter="attention" role="tab"><b>异常关注</b><small id="filterCountAttention">0</small></button>
        </div>
      </div>
      <div id="itemList" class="item-list"></div>
    </section>
  </main>

  <div id="drawerBackdrop" class="drawer-backdrop hidden"></div>
  <aside id="reportDrawer" class="report-drawer hidden" role="dialog" aria-modal="true" aria-labelledby="drawerTitle">
    <div class="drawer-head"><h2 id="drawerTitle">本机报告</h2><button id="closeDrawerBtn" type="button" class="secondary">关闭</button></div>
    <div class="drawer-list"><div id="draftList" class="draft-grid"></div></div>
  </aside>

  <div id="imageViewer" class="image-viewer hidden" role="dialog" aria-modal="true" aria-label="照片预览">
    <div class="image-viewer-bar"><button id="viewerPrevBtn" type="button">上一张</button><span id="viewerCounter">1 / 1</span><button id="viewerNextBtn" type="button">下一张</button><button id="viewerCloseBtn" type="button">关闭</button></div>
    <div class="image-viewer-stage"><img id="viewerImage" alt="现场照片预览"></div>
  </div>

  <footer class="bottom-bar">
    <div class="bottom-progress"><strong id="bottomProgressText">0 / 0 已完成</strong><span id="bottomProgressDetail">待补 0 项</span></div>
    <button id="checkCompletenessBtn" type="button">检查完整性</button>
    <button id="bottomNextBtn" type="button" class="primary">下一待办</button>
  </footer>

  <div id="toast" class="toast hidden"></div>
